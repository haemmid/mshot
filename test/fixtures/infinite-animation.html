<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Infinite Animation Test</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .box {
        width: 100px;
        height: 100px;
        background: red;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }
    </style>
  </head>
  <body>
    <h1>Infinite Animation Test</h1>
    <p>This box pulses forever.</p>
    <div class="box" id="box"></div>
  </body>
</html>
